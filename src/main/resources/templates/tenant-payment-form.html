<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pay Rent - Pena Plaza</title>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <h1>Pay Rent</h1>

    <p>
        Tenant:
        <strong th:text="${user.firstName + ' ' + user.lastName}">Tenant Name</strong>
    </p>

    <div th:if="${#lists.isEmpty(offices)}">
        <p>You do not have any assigned offices to pay for.</p>
    </div>

    <form th:if="${!#lists.isEmpty(offices)}"
          th:action="@{/tenant/payments/checkout}"
          method="post">
        <label for="officeId">Select Office:</label>
        <select name="officeId" id="officeId" required>
            <option value="" disabled selected>Select an office</option>
            <option th:each="office : ${offices}"
                    th:value="${office.id}"
                    th:text="${office.officeNumber + ' - $' + office.monthlyRent}">
            </option>
        </select>
		
		<label for="paymentMonth">Payment Month:</label>
		<input type="month" id="paymentMonth" name="paymentMonth" required>

        <button type="submit">Submit Payment</button>
    </form>

    <hr>

    <h2>Your Payment History</h2>
 
    <div th:if="${#lists.isEmpty(payments)}">
        <p>You have not made any payments yet.</p>
    </div>

    <table th:if="${!#lists.isEmpty(payments)}" border="1" cellpadding="8" cellspacing="0">
        <thead>
            <tr>
                <th>Paid At</th>
                <th>Office</th>
                <th>Amount</th>
                <th>Status</th>
				<th>Rent Month</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="payment : ${payments}">
                <td th:text="${payment.paidAt}">2026-04-23T10:00</td>
                <td th:text="${payment.office.officeNumber}">101</td>
                <td th:text="${payment.amount}">$1200.00</td>
                <td th:text="${payment.status}">PAID</td>
				<td th:text="${payment.paymentMonth}">2026-04</td>
            </tr>
        </tbody>
    </table>
	
	<p th:if="${#lists.isEmpty(payments)}">
	    No payment history yet.
	</p>
</body>
</html>
