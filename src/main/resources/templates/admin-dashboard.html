<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Pena Plaza</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        h1, h2 {
            margin-bottom: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
            margin: 24px 0 32px;
        }

        .stat-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            background: #f8f8f8;
        }

        .section {
            margin-top: 36px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background: #f1f1f1;
        }

        select, button {
            padding: 8px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <h1>Admin Dashboard</h1>
    <p>Manage offices and tenants for Pena Plaza.</p>
	<div class="section">
	    <h2>Management</h2>
	    <p>
	        <a th:href="@{/admin/maintenance}">View Maintenance Requests</a>
	    </p>
		<p>
		    <a th:href="@{/admin/payments}">View Payments</a>
		</p>
		
		<a th:href="@{/admin/lease}">
		    View Leases
		</a>

		<a th:href="@{/admin/lease/new}">
		    Create Lease
		</a>
	</div>

    <div class="stats">
        <div class="stat-card">
            <h3>Total Offices</h3>
            <p th:text="${totalOfficeCount}">0</p>
        </div>

        <div class="stat-card">
            <h3>Available Offices</h3>
            <p th:text="${availableOfficeCount}">0</p>
        </div>

        <div class="stat-card">
            <h3>Occupied Offices</h3>
            <p th:text="${occupiedOfficeCount}">0</p>
        </div>
		<div class="stat-card">
		    <h3>Maintenance Offices</h3>
		    <p th:text="${maintenanceOfficeCount}">0</p>
		</div>
    </div>
</html>
