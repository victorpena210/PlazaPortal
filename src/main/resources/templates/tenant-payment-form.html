<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Payments</title>
</head>
<body>

<h1>Tenant Payments</h1>

<h2>Submit Payment</h2>

<form th:action="@{/tenant/payments/create}" method="post">

    <label>Select Office:</label>

    <select name="officeId" required>

        <option th:each="office : ${offices}"
                th:value="${office.id}"
                th:text="${office.officeNumber}">
        </option>

    </select>

    <br><br>

    <label>Payment Month:</label>

    <input type="month"
           name="paymentMonth"
           required>

    <br><br>

    <button type="submit">
        Submit Payment Request
    </button>

</form>

<hr>

<h2>Payment History</h2>

<table border="1">

    <thead>
        <tr>
            <th>Month</th>
            <th>Total</th>
            <th>Status</th>
            <th>Created</th>
        </tr>
    </thead>

    <tbody>

        <tr th:each="payment : ${payments}">

            <td th:text="${payment.paymentMonth}"></td>

            <td th:text="${payment.totalAmount}"></td>

            <td th:text="${payment.status}"></td>

            <td th:text="${payment.createdAt}"></td>

        </tr>

    </tbody>

</table>

</body>
</html>
