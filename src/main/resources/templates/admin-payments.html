<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payments - Pena Plaza</title>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <h1>All Payments</h1>

    <div th:if="${#lists.isEmpty(payments)}">
        <p>No payments have been recorded yet.</p>
    </div>

    <table th:if="${!#lists.isEmpty(payments)}" border="1" cellpadding="8" cellspacing="0">
        <thead>
            <tr>
                <th>Paid At</th>
                <th>Tenant</th>
                <th>Office</th>
                <th>Amount</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="payment : ${payments}">
                <td th:text="${payment.paidAt}">2026-04-23T10:00</td>
                <td th:text="${payment.user.firstName + ' ' + payment.user.lastName}">Victor Pena</td>
                <td th:text="${payment.office.officeNumber}">101</td>
                <td th:text="${payment.amount}">$1200.00</td>
                <td th:text="${payment.status}">PAID</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
