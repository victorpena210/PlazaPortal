<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Lease</title>
</head>
<body>

<h1>Create Lease</h1>

<form th:action="@{/admin/lease/new}"
      th:object="${lease}"
      method="post">

	  <div>
	      <label>Tenant Name</label>

	      <input type="text"
	             th:field="*{tenantName}"
	             required>
	  </div>

	  <div>
	      <label>Tenant Email</label>

	      <input type="email"
	             th:field="*{tenantEmail}"
	             required>
	  </div>

    <div>
        <label>Office</label>

		<select th:field="*{officeId}" required>

		    <option value="">Select Office</option>

		    <option th:each="office : ${offices}"
		            th:value="${office.id}"
		            th:text="${office.officeNumber}">
		    </option>

		</select>
    </div>

    <div>
        <label>Monthly Rent</label>

		<input type="number"
		       step="0.01"
		       th:field="*{monthlyRent}"
		       required>
    </div>

    <div>
        <label>Start Date</label>

		<input type="date"
		       th:field="*{startDate}"
		       required>
    </div>

    <div>
        <label>End Date</label>

		<input type="date"
		       th:field="*{endDate}"
		       required>
    </div>

	<button type="submit">
	    Create Lease
	</button>

</form>

</body>
</html>
