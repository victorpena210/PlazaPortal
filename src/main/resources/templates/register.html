<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Account - Pena Plaza</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            max-width: 700px;
        }
        h1 {
            margin-bottom: 10px;
        }
        form {
            display: grid;
            gap: 14px;
            margin-top: 20px;
        }
        input {
            padding: 10px;
            font-size: 16px;
            width: 100%;
            box-sizing: border-box;
        }
        label {
            font-weight: bold;
            display: block;
            margin-bottom: 6px;
        }
        .error {
            color: #b00020;
            font-size: 14px;
            margin-top: 4px;
        }
        .success {
            background: #e8f5e9;
            border: 1px solid #81c784;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 16px;
        }
        button {
            padding: 12px 18px;
            font-size: 16px;
            cursor: pointer;
        }
        a {
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
<body>
	<div th:replace="~{fragments/navbar :: navbar}"></div>
    <h1>Create Your Tenant Account</h1>
    <p>Register for access to the Pena Plaza tenant portal.</p>

    <div class="success" th:if="${successMessage}" th:text="${successMessage}"></div>

    <form th:action="@{/register}" th:object="${registrationForm}" method="post">
        <div>
            <label for="firstName">First Name</label>
            <input id="firstName" type="text" th:field="*{firstName}">
            <div class="error" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
        </div>

        <div>
            <label for="lastName">Last Name</label>
            <input id="lastName" type="text" th:field="*{lastName}">
            <div class="error" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
        </div>

        <div>
            <label for="email">Email</label>
            <input id="email" type="email" th:field="*{email}">
            <div class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
        </div>

        <div>
            <label for="password">Password</label>
            <input id="password" type="password" th:field="*{password}">
            <div class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
        </div>

        <div>
            <label for="confirmPassword">Confirm Password</label>
            <input id="confirmPassword" type="password" th:field="*{confirmPassword}">
            <div class="error" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
        </div>

        <button type="submit">Create Account</button>
    </form>

    <a th:href="@{/}">Back to Home</a>
</body>
</html>
