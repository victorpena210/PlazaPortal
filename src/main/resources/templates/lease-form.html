<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Create Lease</title>
</head>
<body>

<h1>Create Lease</h1>

<form th:action="@{/admin/lease/new}"
      th:object="${lease}"
      method="post">

    <div>
        <label>Tenant</label>

		<select th:field="*{tenantId}" required>

		    <option value="">Select Tenant</option>

		    <option th:each="tenant : ${tenants}"
		            th:value="${tenant.id}"
		            th:text="${tenant.firstName + ' ' + tenant.lastName}">
		    </option>

		</select>
    </div>

    <div>
        <label>Office</label>

		<select th:field="*{officeId}" required>

		    <option value="">Select Office</option>

		    <option th:each="office : ${offices}"
		            th:value="${office.id}"
		            th:text="${office.officeNumber}">
		    </option>

		</select>
    </div>

    <div>
        <label>Monthly Rent</label>

		<input type="number"
		       step="0.01"
		       th:field="*{monthlyRent}"
		       required>
    </div>

    <div>
        <label>Start Date</label>

		<input type="date"
		       th:field="*{startDate}"
		       required>
    </div>

    <div>
        <label>End Date</label>

		<input type="date"
		       th:field="*{endDate}"
		       required>
    </div>

	<button type="submit">
	    Create Lease
	</button>

</form>

</body>
</html>
