<form th:action="@{/register}"
      th:object="${registrationForm}"
      method="post">

    <input type="hidden"
           th:field="*{token}" />

    <div>
        <label>First Name</label>
        <input type="text"
               th:field="*{firstName}"
               required>
    </div>

    <div>
        <label>Last Name</label>
        <input type="text"
               th:field="*{lastName}"
               required>
    </div>

    <div>
        <label>Email</label>
        <input type="email"
               th:field="*{email}"
               required>
    </div>

    <div>
        <label>Password</label>
        <input type="password"
               th:field="*{password}"
               required>
    </div>

    <div>
        <label>Confirm Password</label>
        <input type="password"
               th:field="*{confirmPassword}"
               required>
    </div>

    <button type="submit">
        Register
    </button>

</form>
